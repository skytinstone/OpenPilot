camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 30
eye_tracking:
  max_num_faces: 1
  refine_landmarks: true
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.7
  smoothing_alpha: 0.2
  dead_zone_px: 4
  gaze_scale_x: 2.5
  gaze_scale_y: -2.5          # 음수 = Y축 반전 (아래 눈꺼풀 가림 현상 보정)
  calibration_points: 5
  calibration_dwell_ms: 1500
hand_tracking:
  max_num_hands: 2
  min_detection_confidence: 0.6
  min_presence_confidence: 0.6
  min_tracking_confidence: 0.5
  pinch_threshold: 0.35
  scroll_sensitivity: 3500
  inertia_trigger: 0.35
  inertia_decay: 0.88
  click_cooldown_ms: 600
screen:
  width: 1800
  height: 1169
debug:
  show_landmarks: true
  show_gaze_vector: true
  show_fps: true
